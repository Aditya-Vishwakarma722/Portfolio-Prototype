<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aditya Vishwakarma — Blog</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: #111;
            color: #eee;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden
        }

        a {
            color: inherit;
            text-decoration: none
        }

        /* NAV */
        nav {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 1.2rem 2rem
        }

        .nav-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.9rem
        }

        .logo {
            font-weight: 600;
            font-size: 1.4rem;
            letter-spacing: 0.01em
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center
        }

        .nav-links a {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            transition: color 0.2s
        }

        .nav-links a:hover {
            color: #fff
        }

        .nav-links .portfolio-btn {
            color: #eee;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.35rem 0.9rem;
            border-radius: 5px;
            font-size: 0.8rem;
            transition: border-color 0.2s;
            backdrop-filter: blur(8px)
        }

        .nav-links .portfolio-btn:hover {
            border-color: rgba(255, 255, 255, 0.5)
        }

        .nav-border {
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.15), transparent)
        }

        /* HERO */
        .hero-wrap {
            position: relative;
            width: 100%;
            height: 460px;
            overflow: hidden
        }

        #glCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.2) 0%, rgba(17, 17, 17, 1) 100%)
        }

        .hero-content {
            position: absolute;
            bottom: 3rem;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 0 2rem
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(28px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes barGrow {
            from {
                width: 0;
                opacity: 0
            }

            to {
                width: 72px;
                opacity: 1
            }
        }

        .hero-content h1 {
            font-size: clamp(3.2rem, 9vw, 5.5rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.08;
            margin-bottom: 1rem;
            animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) both
        }

        .hero-bar {
            height: 3px;
            width: 72px;
            background: #fff;
            border-radius: 2px;
            margin-bottom: 1.2rem;
            animation: barGrow 0.8s 0.6s cubic-bezier(0.22, 1, 0.36, 1) both
        }

        .hero-content p {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.6);
            max-width: 480px
        }

        /* POSTS */
        .posts {
            max-width: 640px;
            padding: 2.5rem 2rem 5rem
        }

        .posts-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: #555;
            margin-bottom: 1rem;
            font-weight: 600
        }

        /* FILTERS */
        .filters {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.8rem
        }

        .filter-btn {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0.38rem 0.9rem;
            border-radius: 20px;
            border: 1px solid #252525;
            background: transparent;
            color: #555;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif
        }

        .filter-btn:hover {
            color: #ccc;
            border-color: #444
        }

        .filter-btn.active {
            background: #eee;
            color: #111;
            border-color: #eee
        }

        /* POST ITEMS */
        .post {
            padding: 1.5rem 0;
            border-bottom: 1px solid #1e1e1e;
            cursor: pointer;
            transition: transform 0.2s
        }

        .post:hover {
            transform: translateX(6px)
        }

        .post:hover .post-title {
            color: #fff
        }

        .post:hover .post-arrow {
            opacity: 1;
            transform: translateX(0)
        }

        .post-inner {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem
        }

        .post-meta {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            margin-bottom: 0.45rem
        }

        .post-tag {
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #555;
            border: 1px solid #2a2a2a;
            padding: 0.12rem 0.5rem;
            border-radius: 3px
        }

        .post-date {
            font-size: 0.78rem;
            color: #555
        }

        .post-title {
            font-size: 1rem;
            font-weight: 600;
            color: #ccc;
            line-height: 1.4;
            margin-bottom: 0.35rem;
            transition: color 0.2s
        }

        .post-excerpt {
            font-size: 0.84rem;
            color: #666;
            line-height: 1.7
        }

        .post-arrow {
            font-size: 1.2rem;
            color: #444;
            margin-top: 0.2rem;
            flex-shrink: 0;
            opacity: 0;
            transform: translateX(-6px);
            transition: all 0.2s
        }

        .no-results {
            padding: 2rem 0;
            color: #555;
            font-size: 0.88rem
        }

        /* FOOTER */
        footer {
            border-top: 1px solid #1e1e1e;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.78rem;
            color: #555
        }

        .socials {
            display: flex;
            gap: 1.2rem
        }

        .socials a {
            color: #555;
            transition: color 0.2s
        }

        .socials a:hover {
            color: #eee
        }

        /* POPUP */
        .popup-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0);
            backdrop-filter: blur(0px);
            pointer-events: none;
            transition: background 0.35s, backdrop-filter 0.35s
        }

        .popup-overlay.open {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            pointer-events: all
        }

        .popup {
            position: relative;
            width: 100%;
            max-width: 580px;
            background: #141414;
            border: 1px solid #282828;
            border-radius: 16px;
            overflow: hidden;
            transform: translateY(40px) scale(0.96);
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.35s ease;
            max-height: 88vh;
            display: flex;
            flex-direction: column
        }

        .popup-overlay.open .popup {
            transform: translateY(0) scale(1);
            opacity: 1
        }

        .popup-banner {
            position: relative;
            height: 190px;
            flex-shrink: 0;
            display: flex;
            align-items: flex-end;
            padding: 1.4rem 1.6rem;
            overflow: hidden
        }

        .popup-banner-bg {
            position: absolute;
            inset: 0
        }

        .popup-banner-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(20, 20, 20, 0.85) 0%, transparent 60%)
        }

        .popup-banner-tag {
            position: relative;
            z-index: 1;
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 0.22rem 0.6rem;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(4px)
        }

        .popup-body {
            padding: 1.6rem 1.8rem 2rem;
            overflow-y: auto;
            flex: 1
        }

        .popup-body::-webkit-scrollbar {
            width: 4px
        }

        .popup-body::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 4px
        }

        .popup-meta {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            margin-bottom: 0.8rem
        }

        .popup-date,
        .popup-read {
            font-size: 0.78rem;
            color: #555
        }

        .popup-dot {
            color: #333;
            font-size: 0.5rem
        }

        .popup-title {
            font-size: 1.45rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.25;
            color: #eee;
            margin-bottom: 1.2rem
        }

        .popup-divider {
            height: 1px;
            background: #1e1e1e;
            margin-bottom: 1.2rem
        }

        .popup-text {
            font-size: 0.9rem;
            color: #888;
            line-height: 1.85
        }

        .popup-text p+p {
            margin-top: 1rem
        }

        .popup-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            z-index: 10;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #aaa;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s;
            backdrop-filter: blur(4px)
        }

        .popup-close:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff
        }

        @media(max-width:600px) {
            .logo {
                font-size: 1rem
            }

            .nav-links a:not(.portfolio-btn) {
                display: none
            }

            .hero-wrap {
                height: 380px
            }
        }
    </style>
</head>

<body>

    <div class="hero-wrap">
        <canvas id="glCanvas"></canvas>
        <div class="hero-overlay"></div>
        <nav>
            <div class="nav-top">
                <div class="logo">Life Events and Personal Experiences</div>
                <div class="nav-links">
                    <a href="#">About</a>
                    <a href="#" class="portfolio-btn">← Portfolio</a>
                </div>
            </div>
            <div class="nav-border"></div>
        </nav>
        <div class="hero-content">
            <h1>Life & Stories</h1>
            <div class="hero-bar"></div>
            <p>Small stories from my life — events, thoughts, and moments worth remembering.</p>
        </div>
    </div>

    <div class="posts">
        <p class="posts-label">Recent Posts</p>
        <div class="filters">
            <button class="filter-btn active" data-cat="All">All</button>
            <button class="filter-btn" data-cat="Life">Life</button>
            <button class="filter-btn" data-cat="Travel">Travel</button>
            <button class="filter-btn" data-cat="Events">Events</button>
            <button class="filter-btn" data-cat="Studies">Studies</button>
        </div>
        <div id="post-list"></div>
        <p class="no-results" id="no-results">No blogs uploaded yet.</p>
    </div>

    <footer>
        <span>© 2026 Aditya Vishwakarma</span>
        <div class="socials">
            <a href="#">Twitter</a>
            <a href="#">Instagram</a>
            <a href="#">LinkedIn</a>
        </div>
    </footer>

    <div class="popup-overlay" id="popupOverlay">
        <div class="popup" id="popup">
            <button class="popup-close" id="popupClose">✕</button>
            <div class="popup-banner">
                <div class="popup-banner-bg" id="popupBg"></div>
                <div class="popup-banner-overlay"></div>
                <span class="popup-banner-tag" id="popupTag"></span>
            </div>
            <div class="popup-body">
                <div class="popup-meta">
                    <span class="popup-date" id="popupDate"></span>
                    <span class="popup-dot">●</span>
                    <span class="popup-read" id="popupRead"></span>
                </div>
                <h2 class="popup-title" id="popupTitle"></h2>
                <div class="popup-divider"></div>
                <div class="popup-text" id="popupText"></div>
            </div>
        </div>
    </div>

    <script>
        var posts = [];

        // Filter
        document.querySelectorAll('.filter-btn').forEach(function (btn) {
            btn.addEventListener('click', function () {
                var cat = btn.getAttribute('data-cat');
                document.querySelectorAll('.filter-btn').forEach(function (b) { b.classList.remove('active'); });
                btn.classList.add('active');
                var items = document.querySelectorAll('#post-list .post');
                var any = false;
                items.forEach(function (p) {
                    var show = cat === 'All' || p.getAttribute('data-tag') === cat;
                    p.style.display = show ? '' : 'none';
                    if (show) any = true;
                });
                document.getElementById('no-results').style.display = (!any || items.length === 0) ? 'block' : 'none';
            });
        });

        // Popup open
        document.getElementById('post-list').addEventListener('click', function (e) {
            var el = e.target.closest('.post');
            if (!el) return;
            var p = posts[+el.getAttribute('data-index')];
            if (!p) return;
            document.getElementById('popupTag').textContent = p.tag;
            document.getElementById('popupDate').textContent = p.date;
            document.getElementById('popupRead').textContent = p.read;
            document.getElementById('popupTitle').textContent = p.title;
            document.getElementById('popupText').innerHTML = p.body;
            document.getElementById('popupBg').style.background = p.bg;
            document.getElementById('popupOverlay').classList.add('open');
            document.body.style.overflow = 'hidden';
        });

        // Popup close
        function closePost() { document.getElementById('popupOverlay').classList.remove('open'); document.body.style.overflow = ''; }
        document.getElementById('popupClose').addEventListener('click', closePost);
        document.getElementById('popupOverlay').addEventListener('click', function (e) { if (e.target === this) closePost(); });
        document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closePost(); });
