<style>
:root{--bg-dark:#0a0a0c;--card-bg:rgba(15,15,20,0.75);--card-border:rgba(255,255,255,0.1);--text-main:#f0f0f2;--text-muted:#b0b0c0;--color-blue:#3b82f6;--color-red:#ef4444;--font-main:'Inter',sans-serif;--font-logo:'Outfit',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-main);color:var(--text-main);background:#0a0a0c;min-height:100vh;overflow-x:hidden}
#floating-lines-container{mix-blend-mode:screen;position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;pointer-events:none}
.bg-overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;background:radial-gradient(circle at 50% 50%,rgba(5,5,10,0.4) 0%,rgba(0,0,0,0.85) 100%);z-index:1;pointer-events:none}
.header{display:flex;justify-content:flex-start;align-items:center;padding:2rem 5%;max-width:1400px;margin:0 auto;position:relative;z-index:10}
.back-link{display:inline-flex;align-items:center;gap:0.6rem;padding:0.8rem 1.5rem;background:rgba(255,255,255,0.05);border:1px solid var(--card-border);border-radius:50px;color:var(--text-main);text-decoration:none;font-size:0.9rem;font-weight:500;transition:all 0.3s ease;backdrop-filter:blur(10px)}
.back-link:hover{background:rgba(255,255,255,0.1);border-color:var(--color-blue);transform:translateX(-5px)}
.back-link svg{width:18px;height:18px}
main{max-width:1000px;margin:0 auto;padding:0 5% 6rem;position:relative;z-index:10}
.page-title-section{text-align:center;margin-bottom:3rem;padding-top:1rem}
.main-heading{font-family:var(--font-logo);font-size:clamp(3rem,10vw,6rem);font-weight:800;text-transform:uppercase;letter-spacing:-2px;line-height:0.9;margin-bottom:1.5rem;background-image:linear-gradient(120deg,#b5b5b5 0%,#b5b5b5 35%,#fff 50%,#b5b5b5 65%,#b5b5b5 100%);background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shiny 2s linear infinite;display:inline-block}
@keyframes shiny{0%{background-position:150% center}100%{background-position:-50% center}}
.separator-bar{width:120px;height:4px;background:var(--color-blue);margin:0 auto 1.5rem;border-radius:2px;box-shadow:0 0 15px rgba(59,130,246,0.5)}
.subtitle{color:var(--text-muted);font-size:1.1rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:2.5rem}
.sorting-tabs{display:flex;justify-content:center;gap:1rem;margin-bottom:3rem;flex-wrap:wrap}
.sort-tab{background:rgba(255,255,255,0.05);border:1px solid var(--card-border);backdrop-filter:blur(10px);color:var(--text-muted);padding:0.6rem 1.5rem;border-radius:50px;font-size:0.9rem;font-weight:500;cursor:pointer;transition:all 0.3s ease;font-family:var(--font-main);letter-spacing:0.5px}
.sort-tab:hover{background:rgba(255,255,255,0.1);color:var(--text-main);transform:translateY(-2px)}
.sort-tab.active{background:rgba(59,130,246,0.15);border-color:var(--color-blue);color:var(--text-main);box-shadow:0 0 15px rgba(59,130,246,0.3)}

/* Gallery list */
.gallery-list{display:flex;flex-direction:column;gap:0;width:100%}

/* Divider between items */
.gallery-list .vitem:not(:last-child){border-bottom:1px solid rgba(255,255,255,0.05)}

/* Each row */
.vitem{display:grid;grid-template-columns:48px 160px 1fr auto;align-items:center;gap:1.4rem;padding:0.8rem 1rem;text-decoration:none;color:var(--text-main);border-radius:10px;transition:background 0.2s ease;position:relative;cursor:pointer}
.vitem:hover{background:rgba(255,255,255,0.04)}

/* Index number */
.vitem-index{font-size:0.95rem;font-weight:600;color:rgba(255,255,255,0.18);text-align:center;font-family:var(--font-logo);letter-spacing:1px;transition:opacity 0.2s}
.vitem:hover .vitem-index{opacity:0}
.vitem:hover .vitem-play{opacity:1}
.vitem-play{position:absolute;left:1rem;width:48px;text-align:center;opacity:0;transition:opacity 0.2s}
.vitem-play svg{width:18px;height:18px;fill:var(--text-main)}

/* Thumbnail */
.vitem-thumb{width:160px;height:90px;border-radius:8px;overflow:hidden;flex-shrink:0;background:#111;position:relative}
.vitem-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.3s ease}
.vitem:hover .vitem-thumb img{transform:scale(1.08)}
.vitem-thumb-dot{position:absolute;bottom:4px;right:4px;width:8px;height:8px;border-radius:50%;border:1.5px solid rgba(0,0,0,0.5)}

/* Info */
.vitem-info{display:flex;flex-direction:column;gap:0.35rem;min-width:0}
.vitem-title{font-size:0.95rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-main);transition:color 0.2s}
.vitem:hover .vitem-title{color:#fff}
.vitem-meta{display:flex;align-items:center;gap:0.8rem}
.vitem-tag{font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;padding:0.15rem 0.5rem;border-radius:4px}
.vitem-series{font-size:0.78rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Stats */
.vitem-stats{display:flex;align-items:center;gap:1.5rem;flex-shrink:0}
.vitem-stat{display:flex;align-items:center;gap:0.4rem;color:rgba(255,255,255,0.35);font-size:0.8rem;font-weight:500;transition:color 0.2s;white-space:nowrap}
.vitem:hover .vitem-stat{color:rgba(255,255,255,0.6)}
.vitem-stat svg{width:13px;height:13px;stroke:currentColor;stroke-width:2;fill:none}
.vitem-dur{font-size:0.78rem;color:rgba(255,255,255,0.25);font-weight:500;font-variant-numeric:tabular-nums;min-width:32px;text-align:right;transition:color 0.2s}
.vitem:hover .vitem-dur{color:rgba(255,255,255,0.5)}

/* Header row */
.gallery-header{display:grid;grid-template-columns:48px 160px 1fr auto;align-items:center;gap:1.4rem;padding:0 1rem 0.8rem;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:0.2rem}
.gallery-header span{font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,0.25)}
.gh-stats{display:flex;gap:1.5rem;flex-shrink:0}
.gh-stats span{font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,0.25);min-width:32px;text-align:right}

.source-box{position:fixed;bottom:2rem;right:2rem;background:var(--card-bg);backdrop-filter:blur(15px);border:1px solid var(--card-border);padding:1rem 1.5rem;border-radius:12px;z-index:100;box-shadow:0 10px 30px rgba(0,0,0,0.5);transition:all 0.3s ease;text-align:center}
.source-box:hover{transform:translateY(-5px);border-color:var(--color-red)}
.source-box h4{font-size:0.75rem;color:var(--text-muted);margin-bottom:0.6rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:500}
.source-box a{color:var(--text-main);text-decoration:none;font-weight:700;font-size:1rem;transition:color 0.3s ease}
.source-box a:hover{color:var(--color-red)}
footer{text-align:center;padding:3rem 0;border-top:1px solid rgba(255,255,255,0.06);color:rgba(255,255,255,0.2);font-size:0.8rem;position:relative;z-index:10;letter-spacing:1px}

@media(max-width:640px){
  .vitem{grid-template-columns:36px 120px 1fr auto;gap:0.8rem}
  .vitem-thumb{width:120px;height:68px}
  .gallery-header{grid-template-columns:36px 120px 1fr auto;gap:0.8rem}
  .vitem-stats{gap:0.8rem}
  .gh-stats{gap:0.8rem}
  .vitem-stat:first-child{display:none}
  .gh-stats span:first-child{display:none}
}

<script>
(function(){
  const container=document.getElementById('floating-lines-container');
  if(!container||typeof THREE==='undefined')return;
  const vS=`precision highp float;void main(){gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`;
  const fS=`precision highp float;
uniform float iTime;uniform vec3 iResolution;uniform float animationSpeed;
uniform bool enableTop,enableMiddle,enableBottom;
uniform int topLineCount,middleLineCount,bottomLineCount;
uniform float topLineDistance,middleLineDistance,bottomLineDistance;
uniform vec3 topWavePosition,middleWavePosition,bottomWavePosition;
uniform vec2 iMouse;uniform bool interactive;
uniform float bendRadius,bendStrength,bendInfluence;
uniform bool parallax;uniform vec2 parallaxOffset;
uniform vec3 lineGradient[8];uniform int lineGradientCount;
const vec3 BK=vec3(0.0),PK=vec3(233.,71.,245.)/255.,BL=vec3(47.,75.,162.)/255.;
mat2 rot(float r){return mat2(cos(r),sin(r),-sin(r),cos(r));}
vec3 bgc(vec2 uv){vec3 c=vec3(0.);float y=sin(uv.x-.2)*.3-.1;float m=uv.y-y;c+=mix(BL,BK,smoothstep(0.,1.,abs(m)));c+=mix(PK,BK,smoothstep(0.,1.,abs(m-.8)));return c*.5;}
vec3 glc(float t,vec3 b){if(lineGradientCount<=0)return b;if(lineGradientCount==1)return lineGradient[0]*.5;float s=clamp(t,0.,.9999)*float(lineGradientCount-1);int i=int(floor(s));return mix(lineGradient[i],lineGradient[min(i+1,lineGradientCount-1)],fract(s))*.5;}

void main(){
  vec2 uv=(2.*gl_FragCoord.xy-iResolution.xy)/iResolution.y;uv.y*=-1.;
  if(parallax)uv+=parallaxOffset;
  vec3 col=vec3(0.),b=lineGradientCount>0?vec3(0.):bgc(uv);
  vec2 mu=vec2(0.);if(interactive){mu=(2.*iMouse-iResolution.xy)/iResolution.y;mu.y*=-1.;}
  if(enableBottom)for(int i=0;i<6;++i){if(i>=bottomLineCount)break;float fi=float(i),t=fi/max(float(bottomLineCount-1),1.);vec2 r=uv*rot(bottomWavePosition.z*log(length(uv)+1.));col+=glc(t,b)*wave(r+vec2(bottomLineDistance*fi+bottomWavePosition.x,bottomWavePosition.y),1.5+.2*fi,uv,mu,interactive)*.2;}
  if(enableMiddle)for(int i=0;i<6;++i){if(i>=middleLineCount)break;float fi=float(i),t=fi/max(float(bottomLineCount-1),1.);vec2 r=uv*rot(middleWavePosition.z*log(length(uv)+1.));col+=glc(t,b)*wave(r+vec2(middleLineDistance*fi+middleWavePosition.x,middleWavePosition.y),2.+.15*fi,uv,mu,interactive);}
  if(enableTop)for(int i=0;i<6;++i){if(i>=topLineCount)break;float fi=float(i),t=fi/max(float(topLineCount-1),1.);vec2 r=uv*rot(topWavePosition.z*log(length(uv)+1.));r.x*=-1.;col+=glc(t,b)*wave(r+vec2(topLineDistance*fi+topWavePosition.x,topWavePosition.y),1.+.2*fi,uv,mu,interactive)*.1;}
  gl_FragColor=vec4(col,1.);}`;

  const sc=new THREE.Scene(),cam=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
  cam.position.z=1;
  const ren=new THREE.WebGLRenderer({antialias:true,alpha:true});
  ren.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
  ren.setClearColor(0,0);
  ren.domElement.style.cssText='width:100%;height:100%;position:absolute;top:0;left:0;';
  container.appendChild(ren.domElement);

  const u={
    iTime:{value:0},iResolution:{value:new THREE.Vector3()},animationSpeed:{value:1},
    enableTop:{value:true},enableMiddle:{value:true},enableBottom:{value:true},
    topLineCount:{value:6},middleLineCount:{value:6},bottomLineCount:{value:6},
    topLineDistance:{value:.05},middleLineDistance:{value:.05},bottomLineDistance:{value:.05},
    topWavePosition:{value:new THREE.Vector3(10,.5,-.4)},
    middleWavePosition:{value:new THREE.Vector3(5,0,.2)},
    bottomWavePosition:{value:new THREE.Vector3(2,-.7,-1)},
    iMouse:{value:new THREE.Vector2(-1000,-1000)},interactive:{value:true},
    bendRadius:{value:5},bendStrength:{value:-.5},bendInfluence:{value:0},
    parallax:{value:true},parallaxOffset:{value:new THREE.Vector2()},
    lineGradient:{value:Array.from({length:8},()=>new THREE.Vector3(1,1,1))},lineGradientCount:{value:0}

  sc.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2),new THREE.ShaderMaterial({uniforms:u,vertexShader:vS,fragmentShader:fS,transparent:true})));

  let tM=new THREE.Vector2(-1000,-1000),cM=new THREE.Vector2(-1000,-1000),tI=0,cI=0,tP=new THREE.Vector2(),cP=new THREE.Vector2();

})();

function fmt(n){return n>=1000?(n/1000).toFixed(1).replace(/\.0$/,'')+'K':String(n)}
function fmtD(s){return Math.floor(s/60)+':'+(s%60+'').padStart(2,'0')}

function extractSeries(title){
  const m=title.match(/"([^"]+)"/);
  return m?m[1]:'';
}

function renderGallery(arr){
  const gl=document.getElementById('gallery-list');
  gl.innerHTML='';
  arr.forEach((v,i)=>{
    const series=extractSeries(v.title);
    const cleanTitle=v.title.replace(/"[^"]*"/g,'').replace(/\[Edit\/[A-Z]+\]/g,'').replace(/\s{2,}/g,' ').trim();
    const a=document.createElement('a');
    a.href=`https://www.youtube.com/watch?v=${v.id}`;
    a.target='_blank';a.rel='noopener noreferrer';
    a.className='vitem';
    a.innerHTML=`
      <span class="vitem-index">${String(i+1).padStart(2,'0')}</span>
      <div class="vitem-play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
      <div class="vitem-thumb">
        <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" alt="" loading="lazy">
        <div class="vitem-thumb-dot" style="background:${v.color}"></div>
      </div>
      <div class="vitem-info">
        <span class="vitem-title">${cleanTitle}</span>
        <div class="vitem-meta">
          <span class="vitem-tag" style="background:${v.color}18;color:${v.color};border:1px solid ${v.color}30">Edit</span>
          ${series?`<span class="vitem-series">${series}</span>`:''}
        </div>
      </div>
      <div class="vitem-stats">
        <span class="vitem-stat"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>${fmt(v.views)}</span>
        <span class="vitem-stat"><svg viewBox="0 0 24 24"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/></svg>${fmt(v.likes)}</span>
        <span class="vitem-dur">${fmtD(v.duration)}</span>
      </div>`;
    gl.appendChild(a);
  });
}

document.querySelectorAll('.sort-tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.sort-tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    const s=t.dataset.sort;
    renderGallery([...videos].sort((a,b)=>{
      if(s==='recent') return b.date-a.date;
      if(s==='views') return b.views-a.views;
      if(s==='longest') return b.duration-a.duration;
      return a.duration-b.duration; // shortest
    }));
  });
});

renderGallery([...videos].sort((a,b)=>b.date-a.date));
</script>
